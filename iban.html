<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copiar IBAN — Prevolto</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="/assets/logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(800px 500px at 12% -10%, rgba(59,130,246,.18), transparent 60%),
      radial-gradient(800px 500px at 110% 110%, rgba(139,92,246,.18), transparent 55%),
      #050a18;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: rgba(13,20,36,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px 28px;
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6);
    text-align: center;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    color: #94a3b8;
    margin-bottom: 22px;
  }
  .brand img { width: 26px; height: 26px; border-radius: 6px; }
  h1 {
    font-size: 22px; font-weight: 700; margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .sub {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 28px;
  }
  .iban {
    font-family: 'SF Mono', Consolas, 'Courier New', monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.6px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 14px;
    user-select: all;
    color: #fff;
  }
  .beneficiario {
    font-size: 12.5px; color: #64748b;
    margin-bottom: 26px;
  }
  button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: 0.01em;
    box-shadow: 0 12px 30px -10px rgba(99,102,241,.55);
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 40px -10px rgba(99,102,241,.75);
  }
  button:active { transform: translateY(0); }
  button.ok {
    background: linear-gradient(135deg, #059669 0%, #10b981 100%);
    box-shadow: 0 12px 30px -10px rgba(16,185,129,.55);
  }
  button.err {
    background: #dc2626;
  }
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.5;
  }
  .hint a { color: #93c5fd; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/assets/logo.png" alt="Prevolto" onerror="this.style.display='none'">
      <span>PREVOLTO</span>
    </div>
    <h1>Copiar IBAN</h1>
    <p class="sub">Pulsa el botón y pega en tu app del banco.</p>
    <div class="iban" id="ibanDisplay">ES66 0186 1001 9205 2538 3392</div>
    <div class="beneficiario">Beneficiario: <strong style="color:#cbd5e1">Juli Delgado Caldentey</strong></div>
    <button id="copyBtn" type="button">Tocar para copiar</button>
    <p class="hint">Si no copia, mantén pulsado el IBAN de arriba para seleccionarlo y cópialo a mano.</p>
  </div>
  <script>
    var IBAN = 'ES6601861001920525383392';
    var btn = document.getElementById('copyBtn');
    var origLabel = btn.textContent;

    function flashOk() {
      btn.textContent = '✓ IBAN copiado';
      btn.classList.add('ok');
      setTimeout(function () {
        btn.textContent = origLabel;
        btn.classList.remove('ok');
      }, 2200);
    }
    function flashErr() {
      btn.textContent = 'No se pudo copiar — selecciona manualmente';
      btn.classList.add('err');
      setTimeout(function () {
        btn.textContent = origLabel;
        btn.classList.remove('err');
      }, 2500);
    }

    function legacyCopy() {
      try {
        var ta = document.createElement('textarea');
        ta.value = IBAN;
        ta.style.position = 'fixed';
        ta.style.left = '0'; ta.style.top = '0';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        var ok = document.execCommand && document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch (e) { return false; }
    }

    btn.addEventListener('click', function () {
      // Intenta primero execCommand (más permisivo en algunos navegadores)
      if (legacyCopy()) { flashOk(); return; }
      // Fallback a Clipboard API moderna
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(IBAN).then(flashOk).catch(flashErr);
      } else {
        flashErr();
      }
    });
  </script>
</body>
</html>
